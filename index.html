<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Arena (fixed CORS)</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    :root { --bg: #0b0b10; --primary: #bb86fc; --danger: #ff0266; --surface: #1a1a2e; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff;
      display: flex; justify-content: center; align-items: center; min-height: 100vh; text-align: center;
    }
    .container { background: var(--surface); padding: 30px; border-radius: 20px; width: 340px; box-shadow: 0 0 30px rgba(187,134,252,0.3); border: 1px solid #333; }
    input, button { width: 100%; padding: 14px; margin: 10px 0; border-radius: 8px; border: none; font-size: 16px; font-weight: bold; outline: none; }
    input { background: #222; color: #fff; text-align: center; text-transform: uppercase; border: 2px solid #444; }
    input:focus { border-color: var(--primary); }
    button { cursor: pointer; text-transform: uppercase; font-weight: 900; transition: opacity 0.2s; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-pve { background: var(--danger); color: #000; }
    .btn-pvp { background: var(--primary); color: #000; }
    .btn-join { background: #03dac6; color: #000; }
    .status { font-size: 14px; margin: 10px 0; padding: 8px; border-radius: 5px; background: #111; color: #ccc; }
    .status.connected { color: #0f0; }
    .status.disconnected { color: #f00; }
    .hidden { display: none !important; }
    #waiting-screen h2 { margin-bottom: 15px; }
    .code { font-size: 50px; font-weight: 900; color: #fff; text-shadow: 0 0 20px var(--primary); }
    canvas { background: #111; border: 2px solid #333; border-radius: 10px; display: block; margin: 20px auto; width: 100%; max-width: 500px; height: auto; }
  </style>
</head>
<body>

<div id="menu" class="container">
  <h1 style="color:var(--primary); margin-bottom:20px;">NEON ARENA</h1>
  <p style="font-size:14px; color:#888; margin-bottom:10px;">A/D — движение | W — прыжок | ПРОБЕЛ — удар</p>
  <input id="nickname" placeholder="ТВОЙ НИКНЕЙМ" maxlength="15" />
  <button id="btnPvE" class="btn-pve" disabled>Создать PvE (Зомби)</button>
  <button id="btnPvP" class="btn-pvp" disabled>Создать PvP (Дуэль)</button>
  <hr style="border-color:#333; margin:15px 0;">
  <input id="roomCode" placeholder="КОД КОМНАТЫ" maxlength="4" />
  <button id="btnJoin" class="btn-join" disabled>Присоединиться</button>
  <div id="connectionStatus" class="status disconnected">● Отключено</div>
</div>

<div id="waiting-screen" class="container hidden">
  <h2>Код арены</h2>
  <div class="code" id="displayCode">----</div>
  <p>Ожидание игроков...</p>
</div>

<div id="game-screen" class="hidden">
  <canvas id="canvas" width="500" height="300"></canvas>
  <button onclick="location.reload()" style="width:auto; margin-top:10px;">В МЕНЮ</button>
</div>

<script>
  const SERVER_URL = "https://web-production-91b86.up.railway.app";
  let socket = null;
  let myId = null;
  let gameState = { players: {}, zombies: {}, wave: 0 };

  // Отключаем кнопки до подключения
  const btnPvE = document.getElementById('btnPvE');
  const btnPvP = document.getElementById('btnPvP');
  const btnJoin = document.getElementById('btnJoin');
  const statusDiv = document.getElementById('connectionStatus');

  function connect() {
    if (socket && socket.connected) return; // уже подключены
    if (socket) socket.disconnect(); // разрываем старые попытки
    socket = io(SERVER_URL, {
      transports: ['polling'],
      forceNew: true,
      reconnection: false
    });

    socket.on('connect', () => {
      statusDiv.textContent = '● Подключено';
      statusDiv.className = 'status connected';
      btnPvE.disabled = false;
      btnPvP.disabled = false;
      btnJoin.disabled = false;
      console.log('✅ Connected:', socket.id);
    });

    socket.on('disconnect', () => {
      statusDiv.textContent = '● Отключено';
      statusDiv.className = 'status disconnected';
      btnPvE.disabled = true;
      btnPvP.disabled = true;
      btnJoin.disabled = true;
    });

    socket.on('connect_error', (err) => {
      statusDiv.textContent = '● Ошибка: ' + err.message;
      statusDiv.className = 'status disconnected';
    });

    socket.on('room_created', (data) => {
      document.getElementById('menu').classList.add('hidden');
      document.getElementById('waiting-screen').classList.remove('hidden');
      document.getElementById('displayCode').textContent = data.code;
    });

    socket.on('game_start', (data) => {
      myId = data.my_id;
      document.getElementById('waiting-screen').classList.add('hidden');
      document.getElementById('game-screen').classList.remove('hidden');
      requestAnimationFrame(gameLoop);
    });

    socket.on('game_state', (state) => {
      gameState = state;
    });

    socket.on('error', (data) => alert(data.msg));
  }

  // Функции кнопок
  function getNickname() {
    let n = document.getElementById('nickname').value.trim();
    if (!n) n = 'Player_' + Math.floor(Math.random()*1000);
    localStorage.setItem('nickname', n);
    return n;
  }

  window.createRoom = function(mode) {
    if (!socket || !socket.connected) return alert('Нет соединения с сервером');
    const nick = getNickname();
    socket.emit('create_room', { username: nick, mode: mode });
  };

  window.joinRoom = function() {
    if (!socket || !socket.connected) return alert('Нет соединения с сервером');
    const code = document.getElementById('roomCode').value.trim().toUpperCase();
    if (code.length !== 4) return alert('Введите 4 символа');
    const nick = getNickname();
    socket.emit('join_room', { code: code, username: nick });
  };

  // Привязка к кнопкам
  btnPvE.addEventListener('click', () => createRoom('PvE'));
  btnPvP.addEventListener('click', () => createRoom('PvP'));
  btnJoin.addEventListener('click', joinRoom);

  // Управление
  const keys = {};
  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
      e.preventDefault();
      if (socket && socket.connected) socket.emit('attack');
    } else if (['KeyA','KeyD','KeyW','ArrowLeft','ArrowRight','ArrowUp'].includes(e.code)) {
      e.preventDefault();
      if (!keys[e.code]) {
        keys[e.code] = true;
        sendInput(e.code, true);
      }
    }
  });
  window.addEventListener('keyup', (e) => {
    if (['KeyA','KeyD','KeyW','ArrowLeft','ArrowRight','ArrowUp'].includes(e.code)) {
      e.preventDefault();
      keys[e.code] = false;
      sendInput(e.code, false);
    }
  });

  function sendInput(code, pressed) {
    if (!socket || !socket.connected) return;
    let action = null;
    if (code === 'KeyA' || code === 'ArrowLeft') action = 'left';
    else if (code === 'KeyD' || code === 'ArrowRight') action = 'right';
    else if (code === 'KeyW' || code === 'ArrowUp') action = 'up';
    if (action) socket.emit('player_input', { action, state: pressed });
  }

  // Отрисовка (без изменений)
  function draw() {
    const canvas = document.getElementById('canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#222';
    ctx.fillRect(0, 250, canvas.width, 50);
    ctx.strokeStyle = '#555'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, 250); ctx.lineTo(canvas.width, 250); ctx.stroke();

    for (const z of Object.values(gameState.zombies)) {
      drawCharacter(ctx, z.x, z.y, '#ff0266', z.isFacingRight, z.isAttacking, z.hp);
    }
    for (const p of Object.values(gameState.players)) {
      drawCharacter(ctx, p.x, p.y, p.color, p.isFacingRight, p.isAttacking, p.hp);
    }
  }

  function drawCharacter(ctx, x, y, color, facingRight, attacking, hp) {
    if (hp <= 0) return;
    ctx.save();
    ctx.translate(x, y);
    if (!facingRight) ctx.scale(-1, 1);
    ctx.shadowBlur = 10; ctx.shadowColor = color;
    ctx.fillStyle = '#181820'; ctx.strokeStyle = color; ctx.lineWidth = 2;
    ctx.fillRect(-10, -35, 20, 25);
    ctx.strokeRect(-10, -35, 20, 25);
    ctx.beginPath(); ctx.arc(0, -45, 10, 0, Math.PI*2);
    ctx.fillStyle = '#000'; ctx.fill(); ctx.stroke();
    ctx.fillStyle = color; ctx.fillRect(3, -48, 7, 4);
    ctx.beginPath();
    ctx.moveTo(-5, -10); ctx.lineTo(-8, 0);
    ctx.moveTo(5, -10); ctx.lineTo(8, 0);
    ctx.stroke();
    if (attacking) {
      ctx.beginPath(); ctx.moveTo(15, -25); ctx.lineTo(55, -25);
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.stroke();
    }
    ctx.restore();
  }

  function gameLoop() {
    draw();
    requestAnimationFrame(gameLoop);
  }

  // Инициализация
  const saved = localStorage.getItem('nickname');
  if (saved) document.getElementById('nickname').value = saved;
  connect();
</script>
</body>
</html>
