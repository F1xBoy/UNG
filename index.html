<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Arena – Фул‑экран</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0b0b10;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
    }
    #menu {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(26, 26, 46, 0.95);
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      border: 1px solid #333;
      box-shadow: 0 0 40px rgba(187,134,252,0.4);
      z-index: 100;
      width: 320px;
      transition: opacity 0.3s, transform 0.3s;
    }
    #menu.hidden { opacity: 0; transform: translate(-50%, -50%) scale(0.9); pointer-events: none; }
    h1 { color: #bb86fc; margin-bottom: 15px; font-size: 32px; }
    input, button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      border: none;
      font-size: 16px;
      font-weight: bold;
      outline: none;
    }
    input {
      background: #222;
      color: #fff;
      text-align: center;
      border: 2px solid #444;
      text-transform: uppercase;
    }
    input:focus { border-color: #bb86fc; }
    .btn-play {
      background: #ff0266;
      color: #000;
      cursor: pointer;
      text-transform: uppercase;
      font-weight: 900;
      margin-top: 12px;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-play:hover { background: #ff3377; }
    .btn-play:active { transform: scale(0.97); }
    .map-buttons {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin: 10px 0;
    }
    .map-btn {
      flex: 1;
      padding: 10px 5px;
      background: #2a2a3a;
      color: #ccc;
      border: 2px solid #444;
      font-size: 13px;
      border-radius: 8px;
      transition: all 0.2s;
    }
    .map-btn.selected {
      border-color: #bb86fc;
      color: #bb86fc;
      background: #3a3a5a;
    }
    .map-btn:hover { border-color: #888; }
    .hint { font-size: 12px; color: #888; margin-top: 5px; }
    #game-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      opacity: 0;
      transition: opacity 0.4s;
    }
    #game-screen.visible { opacity: 1; }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    .ui-panel {
      position: fixed;
      top: 15px;
      left: 20px;
      right: 20px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      pointer-events: none;
      color: #fff;
      font-size: 18px;
      text-shadow: 2px 2px 4px #000;
      z-index: 10;
    }
    .weapon-indicator {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      padding: 8px 20px;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      color: #fff;
      border: 1px solid #666;
      z-index: 10;
    }
    .game-over {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-size: 50px;
      font-weight: 900;
      color: #ff0266;
      text-shadow: 0 0 30px #ff0266;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 20;
    }
    .game-over.active { opacity: 1; pointer-events: auto; }
    .game-over button {
      margin-top: 25px;
      width: 220px;
      padding: 15px;
      font-size: 20px;
      background: #fff;
      color: #000;
    }
  </style>
</head>
<body>

<div id="menu">
  <h1>NEON ARENA</h1>
  <input id="nickname" placeholder="ТВОЙ НИКНЕЙМ" maxlength="15">
  <div class="map-buttons" id="mapButtons">
    <button class="map-btn selected" data-map="arena">🏟️ Арена</button>
    <button class="map-btn" data-map="rooftops">🏙️ Крыши</button>
    <button class="map-btn" data-map="dungeon">🕳️ Подземелье</button>
  </div>
  <button class="btn-play" onclick="startGame()">ИГРАТЬ</button>
  <p class="hint">Оружие: 1-Меч 2-Пистолет 3-Дробовик</p>
</div>

<div id="game-screen">
  <canvas id="canvas" width="1920" height="1080"></canvas>
  <div class="ui-panel" id="uiPanel"></div>
  <div class="weapon-indicator" id="weaponIndicator">МЕЧ</div>
  <div id="gameOver" class="game-over">
    <span>ВЫ ПОГИБЛИ</span>
    <button onclick="location.reload()">В МЕНЮ</button>
  </div>
</div>

<script>
  // ==================== КОНСТАНТЫ ====================
  const FLOOR_Y = 900; // уровень пола для всех карт

  // Оружие (кулдауны в кадрах ~33 мс)
  const WEAPONS = {
    melee:   { name: 'Меч',      damage: 30, range: 65,  cooldown: 15, ammo: Infinity, type: 'melee' },
    pistol:  { name: 'Пистолет', damage: 18, range: 500, cooldown: 18, ammo: 12, maxAmmo: 12, spareAmmo: 24, type: 'ranged', bulletSpeed: 12 },
    shotgun: { name: 'Дробовик', damage: 8,  pellets: 5, range: 320, cooldown: 35, ammo: 6, maxAmmo: 6, spareAmmo: 18, type: 'ranged', bulletSpeed: 10 }
  };

  // ==================== КЛАССЫ ====================
  class Particle {
    constructor(x, y, color, life = 20) {
      this.x = x; this.y = y;
      this.vx = (Math.random() - 0.5) * 6;
      this.vy = (Math.random() - 2) * 5 - 2;
      this.life = life; this.maxLife = life;
      this.color = color;
    }
    update() { this.x += this.vx; this.y += this.vy; this.vy += 0.15; this.life--; }
  }

  class Pickup {
    constructor(x, y, type) {
      this.x = x; this.y = y;
      this.type = type;
    }
  }

  class Bullet {
    constructor(x, y, vx, vy, damage, range) {
      this.x = x; this.y = y;
      this.vx = vx; this.vy = vy;
      this.damage = damage;
      this.startX = x; this.startY = y;
      this.range = range;
      this.alive = true;
    }
    update() {
      this.x += this.vx; this.y += this.vy;
      if (Math.hypot(this.x - this.startX, this.y - this.startY) > this.range) this.alive = false;
    }
  }

  class Zombie {
    constructor(id, x, y) {
      this.id = id; this.x = x; this.y = y;
      this.spawnY = y;
      this.vx = 0; this.vy = 0;
      this.hp = 40; this.maxHp = 40;
      this.facingRight = true;
      this.attackTimer = 0;
      this.state = 'spawning';
      this.spawnProgress = 0;
      this.dyingTimer = 20;
    }
  }

  // ==================== КАРТЫ (уникальные элементы) ====================
  const MAPS = {
    arena: {
      name: 'Арена',
      bgColor: '#1a1a2e',
      floorY: FLOOR_Y,
      platforms: [
        { x: 200, y: 720, w: 250, h: 15 },
        { x: 1400, y: 720, w: 250, h: 15 },
        { x: 800, y: 580, w: 300, h: 15 }
      ],
      decorations: (ctx) => {
        // Колонны
        ctx.fillStyle = '#4a4a6a';
        ctx.fillRect(400, FLOOR_Y-150, 40, 150);
        ctx.fillRect(1480, FLOOR_Y-150, 40, 150);
        ctx.fillStyle = '#666';
        ctx.fillRect(390, FLOOR_Y-160, 60, 10);
        ctx.fillRect(1470, FLOOR_Y-160, 60, 10);
      }
    },
    rooftops: {
      name: 'Крыши',
      bgColor: '#2a1e2e',
      floorY: FLOOR_Y,
      platforms: [
        { x: 100, y: 760, w: 300, h: 15 },
        { x: 1400, y: 760, w: 300, h: 15 },
        { x: 750, y: 600, w: 400, h: 15 },
        { x: 1500, y: 420, w: 180, h: 15 }
      ],
      decorations: (ctx) => {
        // Антенны
        ctx.fillStyle = '#555';
        ctx.fillRect(600, 550, 8, 150);
        ctx.fillStyle = '#f00';
        ctx.beginPath(); ctx.arc(604, 550, 8, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#555';
        ctx.fillRect(1350, 550, 8, 150);
        ctx.fillStyle = '#f00';
        ctx.beginPath(); ctx.arc(1354, 550, 8, 0, Math.PI*2); ctx.fill();
        // Рекламный щит
        ctx.fillStyle = '#444';
        ctx.fillRect(800, 480, 150, 60);
        ctx.fillStyle = '#ff0266';
        ctx.font = 'bold 20px sans-serif';
        ctx.fillText('NEON', 830, 520);
      }
    },
    dungeon: {
      name: 'Подземелье',
      bgColor: '#1e1e1e',
      floorY: FLOOR_Y,
      platforms: [
        { x: 250, y: 770, w: 250, h: 15 },
        { x: 1350, y: 770, w: 250, h: 15 },
        { x: 800, y: 620, w: 300, h: 15 }
      ],
      decorations: (ctx) => {
        // Сталактиты
        ctx.fillStyle = '#3a3a3a';
        ctx.beginPath();
        ctx.moveTo(300, 50); ctx.lineTo(350, 120); ctx.lineTo(250, 120); ctx.fill();
        ctx.moveTo(1600, 70); ctx.lineTo(1650, 140); ctx.lineTo(1550, 140); ctx.fill();
        // Лава в ямах
        ctx.fillStyle = '#ff4500';
        ctx.fillRect(700, FLOOR_Y, 60, 20);
        ctx.fillRect(1200, FLOOR_Y, 60, 20);
        ctx.fillStyle = '#ff6347';
        for (let i=0;i<6;i++) {
          ctx.beginPath();
          ctx.arc(730+Math.random()*60, FLOOR_Y+10, 4, 0, Math.PI*2);
          ctx.fill();
        }
      }
    }
  };

  // ==================== СОСТОЯНИЕ ИГРЫ ====================
  let canvas, ctx;
  let player = {
    x: 300, y: 100, vx: 0, vy: 0,
    hp: 100, maxHp: 100,
    coins: 0,
    facingRight: true,
    attackTimer: 0,
    currentWeapon: 'melee',
    weapons: {},
    keys: { left: false, right: false, up: false }
  };

  let zombies = [];
  let pickups = [];
  let particles = [];
  let bullets = [];
  let wave = 0;
  let zombiesToSpawn = 0;
  let zombieIdCounter = 0;
  let gameLoopInterval = null;
  let currentMap = null;

  const JUMP_FORCE = -17;

  // ==================== ФУНКЦИИ ====================
  function initWeapons() {
    player.weapons.melee   = { ...WEAPONS.melee };
    player.weapons.pistol  = { ...WEAPONS.pistol,  ammo: WEAPONS.pistol.ammo,  spareAmmo: WEAPONS.pistol.spareAmmo };
    player.weapons.shotgun = { ...WEAPONS.shotgun, ammo: WEAPONS.shotgun.ammo, spareAmmo: WEAPONS.shotgun.spareAmmo };
  }

  function updateWeaponIndicator() {
    const w = player.weapons[player.currentWeapon];
    document.getElementById('weaponIndicator').textContent =
      w.name + (w.type === 'ranged' ? ` [${w.ammo}/${w.maxAmmo}]` : '');
  }

  function startGame() {
    const selectedBtn = document.querySelector('.map-btn.selected');
    const mapKey = selectedBtn ? selectedBtn.dataset.map : 'arena';
    currentMap = MAPS[mapKey];

    document.getElementById('menu').classList.add('hidden');
    const gs = document.getElementById('game-screen');
    gs.classList.add('visible');

    canvas = document.getElementById('canvas');
    ctx = canvas.getContext('2d');
    resizeCanvas();

    player.x = 300; player.y = 100;
    player.hp = player.maxHp;
    player.coins = 0;
    player.attackTimer = 0;
    player.keys = { left: false, right: false, up: false };
    player.currentWeapon = 'melee';
    initWeapons();
    zombies = []; pickups = []; particles = []; bullets = [];
    wave = 0; zombiesToSpawn = 0; zombieIdCounter = 0;
    document.getElementById('gameOver').classList.remove('active');

    updateWeaponIndicator();
    if (gameLoopInterval) clearInterval(gameLoopInterval);
    gameLoopInterval = setInterval(gameLoop, 1000/30);

    window.addEventListener('resize', resizeCanvas);
  }

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function spawnZombie() {
    const side = Math.random() < 0.5 ? 100 : canvas.width - 100;
    const z = new Zombie(zombieIdCounter++, side, currentMap.floorY - 80);
    zombies.push(z);
    zombiesToSpawn--;
  }

  function playerAttack() {
    if (player.hp <= 0 || player.attackTimer > 0) return;
    const weapon = player.weapons[player.currentWeapon];
    if (weapon.type === 'ranged' && weapon.ammo <= 0) return;

    player.attackTimer = weapon.cooldown;

    if (weapon.type === 'melee') {
      const reach = player.facingRight ? player.x + weapon.range : player.x - weapon.range;
      for (let i = zombies.length - 1; i >= 0; i--) {
        const z = zombies[i];
        if (z.state !== 'alive') continue;
        const hit = (player.facingRight && z.x > player.x && z.x - 20 < reach && Math.abs(player.y - z.y) < 80) ||
                    (!player.facingRight && z.x < player.x && z.x + 20 > reach && Math.abs(player.y - z.y) < 80);
        if (hit) {
          damageZombie(z, weapon.damage);
          break;
        }
      }
      for (let i = 0; i < 6; i++) {
        particles.push(new Particle(player.x + (player.facingRight ? 35 : -35), player.y - 40, '#fff', 8));
      }
    } else {
      weapon.ammo--;
      const dir = player.facingRight ? 1 : -1;
      const bulletX = player.x + dir * 30;
      const bulletY = player.y - 40;
      if (weapon.name === 'Дробовик') {
        for (let i = 0; i < weapon.pellets; i++) {
          const angle = (Math.random() - 0.5) * 0.8;
          const vx = dir * weapon.bulletSpeed * Math.cos(angle);
          const vy = weapon.bulletSpeed * Math.sin(angle);
          bullets.push(new Bullet(bulletX, bulletY, vx, vy, weapon.damage, weapon.range));
        }
      } else {
        bullets.push(new Bullet(bulletX, bulletY, dir * weapon.bulletSpeed, 0, weapon.damage, weapon.range));
      }
      updateWeaponIndicator();
    }
  }

  function damageZombie(z, dmg) {
    z.hp -= dmg;
    for (let i = 0; i < 8; i++) particles.push(new Particle(z.x, z.y - 20, '#ff4444', 12));
    if (z.hp <= 0) {
      z.state = 'dying';
      z.dyingTimer = 15;
      player.coins += 10;
      if (Math.random() < 0.4) {
        const type = Math.random() < 0.5 ? 'health' : 'ammo';
        pickups.push(new Pickup(z.x, z.y - 30, type));
      }
    }
  }

  function gameLoop() {
    if (player.hp <= 0) {
      document.getElementById('gameOver').classList.add('active');
      clearInterval(gameLoopInterval);
      return;
    }

    const map = currentMap;

    // Управление
    if (player.keys.left)  { player.vx = -5; player.facingRight = false; }
    else if (player.keys.right) { player.vx = 5; player.facingRight = true; }
    else player.vx = 0;

    let onGround = false;
    if (player.y >= map.floorY) { onGround = true; player.y = map.floorY; player.vy = 0; }
    for (const plat of map.platforms) {
      if (plat.x - 20 < player.x && player.x < plat.x + plat.w + 20 &&
          player.y <= plat.y && player.y + player.vy >= plat.y) {
        onGround = true; player.y = plat.y; player.vy = 0;
      }
    }
    if (player.keys.up && onGround) player.vy = JUMP_FORCE;
    player.vy += 0.6;
    player.x += player.vx;
    player.y += player.vy;
    player.x = Math.max(50, Math.min(canvas.width - 50, player.x));

    if (player.attackTimer > 0) player.attackTimer--;

    // Волны
    if (zombies.length === 0 && zombiesToSpawn === 0) {
      wave++;
      zombiesToSpawn = 3 + wave * 2;
    }
    if (zombiesToSpawn > 0 && Math.random() < 0.025) spawnZombie();

    // Зомби
    for (let i = zombies.length - 1; i >= 0; i--) {
      const z = zombies[i];
      if (z.state === 'spawning') {
        z.spawnProgress += 0.05;
        z.y = z.spawnY - 80 + z.spawnProgress * 80;
        if (z.spawnProgress >= 1) { z.y = z.spawnY; z.state = 'alive'; }
        continue;
      }
      if (z.state === 'dying') {
        z.dyingTimer--;
        if (z.dyingTimer <= 0) {
          zombies.splice(i, 1);
          for (let j = 0; j < 12; j++) particles.push(new Particle(z.x, z.y - 20, '#ff0000', 15));
        }
        continue;
      }
      if (z.attackTimer > 0) z.attackTimer--;
      const dx = player.x - z.x;
      if (Math.abs(dx) > 45) {
        z.vx = dx > 0 ? 1.5 : -1.5;
        z.facingRight = dx > 0;
      } else {
        z.vx = 0;
        if (z.attackTimer === 0 && Math.abs(player.y - z.y) < 70) {
          player.hp -= 8;
          z.attackTimer = 35;
          for (let k = 0; k < 5; k++) particles.push(new Particle(player.x, player.y - 30, '#ff6666', 10));
        }
      }
      z.vy += 0.6;
      z.x += z.vx;
      z.y += z.vy;
      let zOnGround = false;
      if (z.y >= map.floorY) { z.y = map.floorY; z.vy = 0; zOnGround = true; }
      for (const plat of map.platforms) {
        if (plat.x - 15 < z.x && z.x < plat.x + plat.w + 15 &&
            z.y <= plat.y && z.y + z.vy >= plat.y) {
          z.y = plat.y; z.vy = 0; zOnGround = true;
        }
      }
      if (!zOnGround) z.vy += 0.6;
      z.x = Math.max(50, Math.min(canvas.width - 50, z.x));
    }

    // Пули
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      b.update();
      if (!b.alive) { bullets.splice(i, 1); continue; }
      for (let j = zombies.length - 1; j >= 0; j--) {
        const z = zombies[j];
        if (z.state !== 'alive') continue;
        if (Math.hypot(b.x - z.x, b.y - z.y) < 28) {
          damageZombie(z, b.damage);
          bullets.splice(i, 1);
          break;
        }
      }
    }

    // Подбор
    for (let i = pickups.length - 1; i >= 0; i--) {
      const p = pickups[i];
      if (Math.hypot(p.x - player.x, p.y - player.y) < 35) {
        if (p.type === 'health') {
          player.hp = Math.min(player.maxHp, player.hp + 15);
          for (let k = 0; k < 8; k++) particles.push(new Particle(player.x, player.y - 30, '#0f0', 15));
        } else if (p.type === 'ammo') {
          const w = player.weapons[player.currentWeapon];
          if (w.type === 'ranged') {
            w.spareAmmo += 6;
            updateWeaponIndicator();
          }
        }
        pickups.splice(i, 1);
      }
    }

    // Частицы
    for (let i = particles.length - 1; i >= 0; i--) {
      particles[i].update();
      if (particles[i].life <= 0) particles.splice(i, 1);
    }

    updateUI();
    draw();
  }

  function updateUI() {
    const w = player.weapons[player.currentWeapon];
    document.getElementById('uiPanel').innerHTML = `
      <div>
        <div style="color:${player.hp > 30 ? '#bb86fc' : 'red'}">❤️ ${player.hp}/${player.maxHp}</div>
        <div style="color:gold">💰 ${player.coins}</div>
      </div>
      <div style="color:var(--danger); font-size:22px; font-weight:bold;">WAVE ${wave}</div>
      <div style="text-align:right;">${w.name} ${w.type === 'ranged' ? `(${w.ammo}/${w.maxAmmo})` : ''}</div>
    `;
  }

  function draw() {
    const map = currentMap;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = map.bgColor;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Пол
    ctx.fillStyle = '#2a2a2a';
    ctx.fillRect(0, map.floorY, canvas.width, 8);
    ctx.strokeStyle = '#3a3a3a';
    for (let i = 0; i < canvas.width; i += 60) {
      ctx.beginPath();
      ctx.moveTo(i, map.floorY);
      ctx.lineTo(i + 30, map.floorY + 8);
      ctx.stroke();
    }

    // Платформы
    ctx.fillStyle = '#3a3a4a';
    for (const plat of map.platforms) {
      ctx.fillRect(plat.x, plat.y, plat.w, plat.h);
      ctx.strokeStyle = '#666';
      ctx.strokeRect(plat.x, plat.y, plat.w, plat.h);
      ctx.fillStyle = '#4a4a5a';
      ctx.fillRect(plat.x, plat.y - 3, plat.w, 3);
    }

    // Уникальные декорации карты
    map.decorations(ctx);

    // Тени
    const drawShadow = (x, y, radius) => {
      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      ctx.beginPath();
      ctx.ellipse(x, y, radius, radius * 0.35, 0, 0, Math.PI * 2);
      ctx.fill();
    };

    // Зомби
    for (const z of zombies) {
      if (z.state === 'dying') ctx.globalAlpha = z.dyingTimer / 15;
      if (z.state !== 'spawning') drawShadow(z.x, map.floorY + 5, 14);
      drawZombie(z);
      ctx.globalAlpha = 1;
    }

    // Игрок
    drawShadow(player.x, map.floorY + 5, 18);
    drawPlayer();

    // Предметы
    for (const p of pickups) {
      ctx.fillStyle = p.type === 'health' ? '#0f0' : '#ff0';
      ctx.shadowBlur = 10;
      ctx.shadowColor = p.type === 'health' ? '#0f0' : '#ff0';
      ctx.fillRect(p.x - 12, p.y - 12, 24, 24);
      ctx.shadowBlur = 0;
    }

    // Пули
    ctx.fillStyle = '#ff0';
    for (const b of bullets) {
      ctx.beginPath();
      ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
      ctx.fill();
    }

    // Частицы
    for (const p of particles) {
      const alpha = p.life / p.maxLife;
      ctx.fillStyle = p.color.replace(')', `,${alpha})`).replace('rgb', 'rgba');
      ctx.beginPath();
      ctx.arc(p.x, p.y, 2.5, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawPlayer() {
    const x = player.x, y = player.y;
    ctx.save();
    ctx.translate(x, y);
    if (!player.facingRight) ctx.scale(-1, 1);

    ctx.strokeStyle = '#336'; ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(-7, -12); ctx.lineTo(-14, 0);
    ctx.moveTo(7, -12); ctx.lineTo(14, 0);
    ctx.stroke();

    ctx.fillStyle = '#334'; ctx.strokeStyle = '#bb86fc'; ctx.lineWidth = 2;
    ctx.fillRect(-16, -46, 32, 34);
    ctx.strokeRect(-16, -46, 32, 34);

    ctx.beginPath();
    ctx.arc(0, -56, 11, 0, Math.PI * 2);
    ctx.fillStyle = '#222'; ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#bb86fc';
    ctx.fillRect(4, -60, 9, 5);

    if (player.attackTimer > 0 && player.weapons[player.currentWeapon].type === 'melee') {
      ctx.save();
      ctx.translate(20, -35);
      ctx.rotate(-0.7);
      ctx.fillStyle = '#ccf';
      ctx.shadowBlur = 12;
      ctx.shadowColor = '#fff';
      ctx.fillRect(0, -3, 50, 6);
      ctx.restore();
    } else {
      ctx.fillStyle = '#888';
      ctx.fillRect(18, -42, 22, 5);
      ctx.fillStyle = '#ccc';
      ctx.fillRect(18, -44, 7, 9);
    }

    ctx.restore();
  }

  function drawZombie(z) {
    ctx.save();
    ctx.translate(z.x, z.y);
    if (!z.facingRight) ctx.scale(-1, 1);

    ctx.fillStyle = '#2a1e1e'; ctx.strokeStyle = '#ff4444'; ctx.lineWidth = 2;
    ctx.fillRect(-14, -44, 28, 32);
    ctx.strokeRect(-14, -44, 28, 32);

    ctx.beginPath();
    ctx.arc(0, -54, 10, 0, Math.PI * 2);
    ctx.fillStyle = '#111'; ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#ff4444';
    ctx.fillRect(3, -58, 8, 4);

    ctx.beginPath();
    ctx.moveTo(-7, -12); ctx.lineTo(-12, 0);
    ctx.moveTo(7, -12); ctx.lineTo(12, 0);
    ctx.stroke();

    ctx.strokeStyle = '#ff4444'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(14, -28); ctx.lineTo(22, -34);
    ctx.stroke();

    ctx.restore();
  }

  // Управление
  const keys = {};
  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
      e.preventDefault(); playerAttack();
    } else if (e.code === 'Digit1') {
      player.currentWeapon = 'melee'; updateWeaponIndicator();
    } else if (e.code === 'Digit2') {
      player.currentWeapon = 'pistol'; updateWeaponIndicator();
    } else if (e.code === 'Digit3') {
      player.currentWeapon = 'shotgun'; updateWeaponIndicator();
    } else if (['KeyA','KeyD','KeyW','ArrowLeft','ArrowRight','ArrowUp'].includes(e.code)) {
      e.preventDefault();
      keys[e.code] = true;
      player.keys.left  = keys['KeyA'] || keys['ArrowLeft'];
      player.keys.right = keys['KeyD'] || keys['ArrowRight'];
      player.keys.up    = keys['KeyW'] || keys['ArrowUp'];
    }
  });
  window.addEventListener('keyup', (e) => {
    if (['KeyA','KeyD','KeyW','ArrowLeft','ArrowRight','ArrowUp'].includes(e.code)) {
      e.preventDefault();
      keys[e.code] = false;
      player.keys.left  = keys['KeyA'] || keys['ArrowLeft'];
      player.keys.right = keys['KeyD'] || keys['ArrowRight'];
      player.keys.up    = keys['KeyW'] || keys['ArrowUp'];
    }
  });

  // Выбор карты
  document.querySelectorAll('.map-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.map-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    });
  });

  // Никнейм
  const savedNick = localStorage.getItem('nickname');
  if (savedNick) document.getElementById('nickname').value = savedNick;
</script>
</body>
</html>
