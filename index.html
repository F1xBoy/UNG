<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Arena (Prototype)</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        :root { --bg: #0a0a0c; --primary: #bb86fc; --secondary: #03dac6; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; flex-direction: column; }
        #menu { background: #16161a; padding: 30px; border-radius: 20px; text-align: center; border: 1px solid #23232a; box-shadow: 0 0 30px rgba(0,0,0,0.8); z-index: 10; }
        input { padding: 10px; font-size: 16px; border-radius: 8px; border: 2px solid #2c2c35; background: #1f1f25; color: #fff; text-transform: uppercase; text-align: center; margin-bottom: 15px; width: 80%; }
        button { padding: 12px 20px; font-size: 16px; font-weight: bold; cursor: pointer; border: none; border-radius: 8px; margin: 5px; width: 100%; transition: 0.2s; }
        .btn-create { background: var(--primary); color: #000; }
        .btn-join { background: var(--secondary); color: #000; }
        button:hover { transform: scale(1.05); filter: brightness(1.2); }
        
        /* Игровой холст скрыт до старта */
        canvas { display: none; background: #121216; border: 2px solid #2c2c35; border-radius: 10px; box-shadow: 0 0 40px rgba(187,134,252,0.1); }
        #ui { display: none; position: absolute; top: 20px; font-size: 24px; font-weight: bold; color: #888; text-shadow: 0 0 10px currentColor; }
    </style>
</head>
<body>

    <div id="menu">
        <h1 style="color: var(--primary); margin-top:0;">NEON ARENA</h1>
        <p style="color: #666;">Прототип физики для портала</p>
        <button class="btn-create" onclick="createRoom()">Создать комнату</button>
        <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">
        <input type="text" id="roomInput" placeholder="Код комнаты" maxlength="4">
        <button class="btn-join" onclick="joinRoom()">Войти в замес</button>
        <div id="status" style="margin-top: 15px; color: #b3b3b3;"></div>
    </div>

    <div id="ui">АРЕНА</div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <script>
        // =========================================================
        // БРО, ВСТАВЛЯЙ ССЫЛКУ С RENDER СЮДА!
        const socket = io("https://ung-6k09.onrender.com");
        // =========================================================

        const menu = document.getElementById('menu');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const ui = document.getElementById('ui');
        
        let roomID = null;
        let gameActive = false;

        // Физика арены
        const GRAVITY = 0.6;
        const FLOOR = 350;

        // Игроки (квадраты-прототипы стикменов)
        let myPlayer = { x: 100, y: 100, vx: 0, vy: 0, w: 30, h: 60, color: 'var(--primary)', speed: 5, jump: -12 };
        let enemy = { x: 600, y: 100, w: 30, h: 60, color: 'var(--secondary)' };

        // Управление
        let keys = { 'ArrowLeft': false, 'ArrowRight': false, 'ArrowUp': false, 'a': false, 'd': false, 'w': false };

        // Слушатели кнопок
        window.addEventListener('keydown', (e) => { if (keys.hasOwnProperty(e.key)) keys[e.key] = true; });
        window.addEventListener('keyup', (e) => { if (keys.hasOwnProperty(e.key)) keys[e.key] = false; });

        // --- Сетевая логика ---
        function createRoom() {
            document.getElementById('status').innerText = "Коннектимся...";
            socket.emit('create_room');
        }

        function joinRoom() {
            const code = document.getElementById('roomInput').value;
            if(code.length !== 4) return alert('Код — 4 символа!');
            socket.emit('join_room', { code: code });
        }

        socket.on('room_created', (data) => {
            document.getElementById('status').innerHTML = `Ждем врага... Твой код: <strong style="color: var(--primary); font-size: 20px;">${data.code}</strong>`;
        });

        socket.on('error', (data) => alert(data.msg));

        socket.on('game_start', (data) => {
            roomID = data.room;
            menu.style.display = 'none';
            canvas.style.display = 'block';
            ui.style.display = 'block';
            ui.innerText = `КОМНАТА: ${roomID}`;
            
            // Если ты хост - стоишь слева, клиент - справа
            if (data.role === 'client') {
                myPlayer.x = 600;
                myPlayer.color = 'var(--secondary)';
                enemy.color = 'var(--primary)';
            }
            gameActive = true;
            gameLoop();
            
            // Запускаем отправку своих координат на сервер (30 раз в секунду)
            setInterval(sendPosition, 1000 / 30);
        });

        socket.on('enemy_pos', (data) => {
            // Обновляем позицию врага по данным с сервера
            enemy.x = data.x;
            enemy.y = data.y;
        });

        socket.on('opponent_left', () => {
            alert("Соперник сбежал с арены!");
            location.reload();
        });

        function sendPosition() {
            if (gameActive) {
                socket.emit('sync_pos', { room: roomID, x: myPlayer.x, y: myPlayer.y });
            }
        }

        // --- Игровой цикл и физика ---
        function updatePhysics() {
            // Движение влево-вправо
            if (keys['ArrowLeft'] || keys['a']) myPlayer.vx = -myPlayer.speed;
            else if (keys['ArrowRight'] || keys['d']) myPlayer.vx = myPlayer.speed;
            else myPlayer.vx = 0;

            // Прыжок (только если на полу)
            if ((keys['ArrowUp'] || keys['w']) && myPlayer.y + myPlayer.h >= FLOOR) {
                myPlayer.vy = myPlayer.jump;
            }

            // Применяем гравитацию
            myPlayer.vy += GRAVITY;
            
            // Меняем позицию
            myPlayer.x += myPlayer.vx;
            myPlayer.y += myPlayer.vy;

            // Коллизия со стенами арены
            if (myPlayer.x < 0) myPlayer.x = 0;
            if (myPlayer.x + myPlayer.w > canvas.width) myPlayer.x = canvas.width - myPlayer.w;

            // Коллизия с полом
            if (myPlayer.y + myPlayer.h > FLOOR) {
                myPlayer.y = FLOOR - myPlayer.h;
                myPlayer.vy = 0;
            }
        }

        function draw() {
            // Очищаем экран
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Рисуем пол
            ctx.fillStyle = '#2c2c35';
            ctx.fillRect(0, FLOOR, canvas.width, canvas.height - FLOOR);

            // Рисуем меня
            ctx.fillStyle = myPlayer.color;
            ctx.shadowBlur = 15;
            ctx.shadowColor = myPlayer.color;
            ctx.fillRect(myPlayer.x, myPlayer.y, myPlayer.w, myPlayer.h);

            // Рисуем врага
            ctx.fillStyle = enemy.color;
            ctx.shadowColor = enemy.color;
            ctx.fillRect(enemy.x, enemy.y, enemy.w, enemy.h);
            
            ctx.shadowBlur = 0; // отключаем свечение для остального
        }

        function gameLoop() {
            if (!gameActive) return;
            updatePhysics();
            draw();
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
