<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Cyborg Duels</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        :root { --bg: #050507; --primary: #bb86fc; --secondary: #03dac6; --danger: #ff0266; --surface: #121216; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; flex-direction: column; }
        
        /* Менюшка */
        #menu { background: var(--surface); padding: 40px; border-radius: 20px; text-align: center; border: 1px solid #23232a; box-shadow: 0 0 50px rgba(0,0,0,0.9); z-index: 10; width: 320px; }
        h1 { margin-top: 0; font-size: 34px; letter-spacing: 2px; text-transform: uppercase; }
        .text-glow-primary { color: var(--primary); text-shadow: 0 0 15px var(--primary); }
        .text-glow-secondary { color: var(--secondary); text-shadow: 0 0 15px var(--secondary); }
        input { padding: 12px; font-size: 20px; border-radius: 8px; border: 2px solid #2c2c35; background: #1a1a24; color: #fff; text-transform: uppercase; text-align: center; margin-bottom: 20px; width: 100%; box-sizing: border-box; outline: none; transition: 0.3s; font-weight: bold; letter-spacing: 3px; }
        input:focus { border-color: var(--secondary); box-shadow: 0 0 15px rgba(3, 218, 198, 0.3); }
        button { padding: 15px; font-size: 16px; font-weight: 900; cursor: pointer; border: none; border-radius: 8px; margin-bottom: 15px; width: 100%; transition: 0.2s; text-transform: uppercase; letter-spacing: 1px; }
        .btn-create { background: var(--primary); color: #000; box-shadow: 0 0 20px rgba(187,134,252,0.4); }
        .btn-join { background: var(--secondary); color: #000; box-shadow: 0 0 20px rgba(3, 218, 198, 0.4); }
        button:hover { transform: translateY(-3px); filter: brightness(1.2); }
        
        /* Экран ожидания (НОВОЕ) */
        #waiting-screen { display: none; background: var(--surface); padding: 50px; border-radius: 20px; text-align: center; border: 1px solid var(--primary); box-shadow: 0 0 60px rgba(187,134,252,0.2); z-index: 10; }
        .code-display { font-size: 60px; font-weight: 900; color: #fff; letter-spacing: 10px; margin: 20px 0; text-shadow: 0 0 30px var(--primary); background: #0a0a0c; padding: 20px; border-radius: 15px; border: 2px dashed #333; }
        
        /* Игра */
        #game-container { display: none; position: relative; }
        canvas { background: linear-gradient(180deg, #0a0a0c 0%, #1a1a24 100%); border: 3px solid #2c2c35; border-radius: 12px; box-shadow: 0 0 60px rgba(0,0,0,0.8); }
        
        .ui-panel { position: absolute; top: 25px; width: 100%; display: flex; justify-content: space-between; padding: 0 30px; box-sizing: border-box; }
        .hp-bar-container { width: 320px; height: 30px; background: #111; border: 3px solid #333; border-radius: 15px; overflow: hidden; position: relative; }
        .hp-bar { height: 100%; width: 100%; transition: width 0.15s cubic-bezier(0.4, 0, 0.2, 1); }
        #my-hp { background: linear-gradient(90deg, #8800ff, var(--primary)); box-shadow: 0 0 15px var(--primary); }
        #enemy-hp { background: linear-gradient(90deg, #00b3a3, var(--secondary)); box-shadow: 0 0 15px var(--secondary); }
        
        #win-screen { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; font-size: 50px; font-weight: 900; text-shadow: 0 0 30px currentColor; flex-direction: column; z-index: 20; backdrop-filter: blur(5px); }
    </style>
</head>
<body>

    <div id="menu">
        <h1 class="text-glow-primary">NEON ARENA</h1>
        <p style="color: #888; font-size: 14px; margin-bottom: 30px;">A/D или Стрелочки — Движение<br>W или Вверх — Прыжок<br><strong style="color: #fff;">ПРОБЕЛ — УДАР МЕЧОМ</strong></p>
        <button class="btn-create" onclick="createRoom()">Создать арену</button>
        <hr style="border: 0; border-top: 1px solid #2c2c35; margin: 25px 0;">
        <input type="text" id="roomInput" placeholder="ВВЕДИ КОД" maxlength="4">
        <button class="btn-join" onclick="joinRoom()">Ворваться</button>
    </div>

    <div id="waiting-screen">
        <h2 style="color: #888; margin: 0; text-transform: uppercase;">Код твоей арены</h2>
        <div class="code-display" id="display-code">----</div>
        <p style="color: var(--primary); font-size: 18px; font-weight: bold; margin: 0;">Кидай код другу. Ждем подключения...</p>
    </div>

    <div id="game-container">
        <div class="ui-panel">
            <div class="hp-bar-container"><div id="my-hp" class="hp-bar"></div></div>
            <div style="font-weight: 900; font-size: 28px; color: #555; text-shadow: 0 0 10px #000;">VS</div>
            <div class="hp-bar-container"><div id="enemy-hp" class="hp-bar"></div></div>
        </div>
        <canvas id="gameCanvas" width="1000" height="550"></canvas>
        <div id="win-screen">
            <span id="win-text"></span>
            <button onclick="location.reload()" style="margin-top: 30px; width: 250px; background: #fff; color: #000; box-shadow: 0 0 20px #fff;">ВЕРНУТЬСЯ В МЕНЮ</button>
        </div>
    </div>

    <script>
        // =========================================================
        // БРО, ВСТАВЛЯЙ СВОЮ ССЫЛКУ С RENDER ВМЕСТО ЭТОЙ!
        const socket = io("https://ung-6k09.onrender.com");
        // =========================================================

        const menu = document.getElementById('menu');
        const waitingScreen = document.getElementById('waiting-screen');
        const gameContainer = document.getElementById('game-container');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let roomID = null;
        let gameActive = false;

        // Настройки физики
        const GRAVITY = 0.8;
        const FLOOR = 480;
        const JUMP_FORCE = -16;
        const SPEED = 7;
        const ATTACK_RANGE = 90;
        const ATTACK_DAMAGE = 12;

        class Player {
            constructor(x, color, isFacingRight) {
                this.x = x;
                this.y = 100;
                this.vx = 0;
                this.vy = 0;
                this.hp = 100;
                this.color = color;
                this.isFacingRight = isFacingRight;
                this.isAttacking = false;
                this.attackCooldown = 0;
            }
        }

        let me = new Player(250, 'var(--primary)', true);
        let enemy = new Player(750, 'var(--secondary)', false);

        let keys = {};
        window.addEventListener('keydown', (e) => { keys[e.code] = true; });
        window.addEventListener('keyup', (e) => { keys[e.code] = false; });

        // --- Сеть ---
        function createRoom() {
            socket.emit('create_room', {});
        }

        function joinRoom() {
            const code = document.getElementById('roomInput').value;
            if(code.length !== 4) return alert('Эй, код должен быть из 4 букв/цифр!');
            socket.emit('join_room', { code: code });
        }

        socket.on('room_created', (data) => {
            // Прячем меню, показываем красивое окно с кодом
            menu.style.display = 'none';
            waitingScreen.style.display = 'block';
            document.getElementById('display-code').innerText = data.code;
        });

        socket.on('error', (data) => alert(data.msg));

        socket.on('game_start', (data) => {
            roomID = data.room;
            // Прячем всё лишнее, врубаем игру
            menu.style.display = 'none';
            waitingScreen.style.display = 'none';
            gameContainer.style.display = 'block';
            
            if (data.role === 'client') {
                me.x = 750; me.color = 'var(--secondary)'; me.isFacingRight = false;
                enemy.x = 250; enemy.color = 'var(--primary)'; enemy.isFacingRight = true;
                
                // Свапаем цвета ХП баров, чтобы твой всегда был слева правильного цвета
                document.getElementById('my-hp').style.background = 'linear-gradient(90deg, #00b3a3, var(--secondary))';
                document.getElementById('my-hp').style.boxShadow = '0 0 15px var(--secondary)';
                document.getElementById('enemy-hp').style.background = 'linear-gradient(90deg, #8800ff, var(--primary))';
                document.getElementById('enemy-hp').style.boxShadow = '0 0 15px var(--primary)';
            }
            gameActive = true;
            gameLoop();
            setInterval(sendData, 1000 / 40);
        });

        socket.on('enemy_data', (data) => {
            enemy.x = data.x;
            enemy.y = data.y;
            enemy.isFacingRight = data.isFacingRight;
            enemy.isAttacking = data.isAttacking;
            
            if (data.enemyHp < me.hp) {
                me.hp = data.enemyHp;
                updateHPUI();
                checkDeath();
            }
        });

        socket.on('opponent_left', () => {
            if(!gameActive) return;
            alert("Враг выдернул шнур интернета! Ты победил технически.");
            location.reload();
        });

        function sendData() {
            if (!gameActive) return;
            socket.emit('sync_data', { 
                room: roomID, 
                x: me.x, y: me.y, 
                isFacingRight: me.isFacingRight, 
                isAttacking: me.isAttacking,
                enemyHp: enemy.hp 
            });
        }

        // --- Механики ---
        function attack() {
            if (me.attackCooldown > 0) return;
            me.isAttacking = true;
            me.attackCooldown = 30; // Кулдаун удара

            let reach = me.isFacingRight ? me.x + ATTACK_RANGE : me.x - ATTACK_RANGE;
            let hit = false;

            // Проверка попадания мечом по Хитбоксу врага (ширина хитбокса около 40px)
            if (me.isFacingRight && enemy.x > me.x && enemy.x - 20 < reach && Math.abs(me.y - enemy.y) < 80) hit = true;
            if (!me.isFacingRight && enemy.x < me.x && enemy.x + 20 > reach && Math.abs(me.y - enemy.y) < 80) hit = true;

            if (hit) {
                enemy.hp -= ATTACK_DAMAGE;
                updateHPUI();
                checkDeath();
            }

            setTimeout(() => { me.isAttacking = false; }, 200); // Длительность взмаха
        }

        function updateHPUI() {
            document.getElementById('my-hp').style.width = Math.max(0, me.hp) + '%';
            document.getElementById('enemy-hp').style.width = Math.max(0, enemy.hp) + '%';
        }

        function checkDeath() {
            if (me.hp <= 0 || enemy.hp <= 0) {
                gameActive = false;
                const winScreen = document.getElementById('win-screen');
                const winText = document.getElementById('win-text');
                winScreen.style.display = 'flex';
                if (me.hp > 0) {
                    winText.innerText = "АБСОЛЮТНАЯ ПОБЕДА";
                    winText.className = 'text-glow-secondary';
                } else {
                    winText.innerText = "ТЕБЯ РАЗМАЗАЛИ ПО АРЕНЕ";
                    winText.className = 'text-glow-primary';
                    winText.style.color = 'var(--danger)';
                    winText.style.textShadow = '0 0 20px var(--danger)';
                }
            }
        }

        function updatePhysics() {
            if (me.attackCooldown > 0) me.attackCooldown--;

            // Движение
            if (keys['KeyA'] || keys['ArrowLeft']) { me.vx = -SPEED; me.isFacingRight = false; }
            else if (keys['KeyD'] || keys['ArrowRight']) { me.vx = SPEED; me.isFacingRight = true; }
            else { me.vx = 0; }

            // Прыжок
            if ((keys['KeyW'] || keys['ArrowUp']) && me.y >= FLOOR) { me.vy = JUMP_FORCE; }

            // Удар
            if (keys['Space']) { attack(); keys['Space'] = false; }

            me.vy += GRAVITY;
            me.x += me.vx;
            me.y += me.vy;

            // Границы арены
            if (me.x < 30) me.x = 30;
            if (me.x > canvas.width - 30) me.x = canvas.width - 30;

            if (me.y > FLOOR) { me.y = FLOOR; me.vy = 0; }
        }

        // --- НОВАЯ ГРАФИКА: КИБОРГИ С МЕЧАМИ ---
        function drawCyborg(p) {
            ctx.save();
            // Перемещаем центр координат в ноги игрока
            ctx.translate(p.x, p.y);
            
            // Если смотрит влево — отзеркаливаем всё по горизонтали
            if (!p.isFacingRight) { ctx.scale(-1, 1); }

            // Общее свечение персонажа
            ctx.shadowBlur = 15;
            ctx.shadowColor = p.color;

            // 1. Броня (Тело)
            ctx.fillStyle = '#181820';
            ctx.strokeStyle = p.color;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.rect(-15, -60, 30, 40); // Широкий торс
            ctx.fill();
            ctx.stroke();

            // 2. Голова-шлем
            ctx.beginPath();
            ctx.arc(0, -75, 16, 0, Math.PI * 2);
            ctx.fillStyle = '#111';
            ctx.fill();
            ctx.stroke();

            // Визор (Светящийся глаз)
            ctx.fillStyle = p.color;
            ctx.shadowBlur = 20;
            ctx.fillRect(2, -80, 14, 6);
            ctx.shadowBlur = 15; // Возвращаем обычное свечение

            // 3. Ноги
            ctx.lineWidth = 7;
            ctx.lineCap = 'round';
            ctx.beginPath();
            // Задняя нога
            ctx.moveTo(-7, -20); ctx.lineTo(-12, 0);
            // Передняя нога
            ctx.moveTo(7, -20); ctx.lineTo(12, 0);
            ctx.stroke();

            // 4. Руки и Оружие (Меч)
            if (p.isAttacking) {
                // Анимация удара: рука вытянута вперед
                ctx.beginPath();
                ctx.moveTo(-5, -50);
                ctx.lineTo(25, -45); // Рука бьет
                ctx.stroke();

                // Энергетический меч (Взмах)
                ctx.shadowBlur = 30;
                ctx.strokeStyle = '#fff'; // Белое ядро меча
                ctx.lineWidth = 6;
                ctx.beginPath();
                ctx.moveTo(25, -45);
                ctx.lineTo(75, -15); // Меч рубит вниз
                ctx.stroke();
            } else {
                // Стойка покоя: рука согнута
                ctx.beginPath();
                ctx.moveTo(-5, -50);
                ctx.lineTo(5, -35); // Плечо
                ctx.lineTo(20, -40); // Предплечье держит меч
                ctx.stroke();

                // Энергетический меч (Покой)
                ctx.shadowBlur = 25;
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 5;
                ctx.beginPath();
                ctx.moveTo(20, -40);
                ctx.lineTo(5, -90); // Меч направлен вверх и назад
                ctx.stroke();
            }

            ctx.restore();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Красивый пол с неоновой линией
            ctx.fillStyle = '#111116';
            ctx.fillRect(0, FLOOR, canvas.width, canvas.height - FLOOR);
            
            ctx.shadowBlur = 15;
            ctx.shadowColor = 'var(--primary)';
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 4;
            ctx.beginPath(); 
            ctx.moveTo(0, FLOOR); 
            ctx.lineTo(canvas.width, FLOOR); 
            ctx.stroke();
            ctx.shadowBlur = 0; // Отключаем тень для пола

            // Рисуем игроков (сначала враг, потом я, чтобы я был поверх)
            drawCyborg(enemy);
            drawCyborg(me);
        }

        function gameLoop() {
            if (!gameActive) return;
            updatePhysics();
            draw();
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
